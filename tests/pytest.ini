# pytest.ini

[pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    # Tests deliberately sweep wide split_kws ranges that include empty-Pattern-bucket
    # configs (n_min*steps[0] > len_max). The advisory is for real users; the explicit
    # pytest.warns() regression in test_cpp_run.py still catches it (it overrides this).
    ignore:'Pattern' split config:UserWarning
minversion = 6.0