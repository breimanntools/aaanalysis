# pytest.ini

[pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    # Tests deliberately sweep wide split_kws ranges that include empty-Pattern-bucket
    # configs (n_min*steps[0] > len_max). The advisory is for real users; the explicit
    # pytest.warns() regression in test_cpp_run.py still catches it (it overrides this).
    ignore:'Pattern' split config:UserWarning
    # Many tests call CPP.run/run_num with the default n_filter=100 on tiny fixtures, so
    # the D5b sparse-config advisory (n_candidates < n_filter) and the D7 shortfall
    # advisory (n_final < n_filter) fire incidentally. They are for real users; the
    # explicit pytest.warns() regressions in test_filter_stats.py still catch them.
    ignore:'n_filter'.*candidate features:UserWarning
    ignore:'n_filter'.*filter could deliver:RuntimeWarning
minversion = 6.0
markers =
    regression: frozen exact-value CPP anchor; pinned to the canonical cell (Linux/py3.11) and skipped elsewhere (ADR-0015).
    slow: opt-in heavy test; deselect with -m "not slow" in fast CI runs.
    network: hits a live external endpoint (AlphaFold/UniProt/HF); deselected by default with -m "not network", run on demand / in the nightly to catch upstream API breakage.
    integration: cross-component seam test (two/three real classes, no mocks). Runs in the dedicated 'Integration & E2E Tests' workflow (excluded from the Unit Tests matrix). See ADR-0031.
    e2e: full user-facing pipeline mirroring a protocol notebook, tiny+seeded. Runs in the dedicated 'Integration & E2E Tests' workflow (excluded from the Unit Tests matrix). See ADR-0031.
    smoke: sub-minute critical-path check (load -> CPP.run -> TreeModel.fit) for a fast local sanity gate; run with `pytest -m smoke -c tests/pytest.ini`. Non-blocking (not a separate CI job).