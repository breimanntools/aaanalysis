name: Nightly (mutation + regression)

# NON-GATING nightly job (ADR-0015 / ADR-0016). Runs on a schedule and on
# manual dispatch — never on push/PR, so it never blocks merges. It does four
# things on the canonical cell (Linux + py3.11):
#   0. Runs the heavy `slow` tier (`-m slow`) that the fast PR matrix deselects,
#      so the multi-minute pipe sweeps still get exercised at least daily.
#   1. Re-verifies the exact-value CPP regression anchor (`-m regression`).
#   2. Runs the live online-fetch tests (`-m network --run-network`) so an
#      upstream API/version change (e.g. AlphaFold's v4->v6 file rename, which
#      silently broke fetch_alphafold) surfaces as a red nightly instead of
#      slipping past the mocked unit tests.
#   3. Runs a scoped, non-gating mutmut audit of the CPP numeric core; surviving
#      mutants are a TODO list for stronger golden/property tests, not a gate.

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch: {}

jobs:
  nightly:
    name: Mutation + regression (Linux/py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package + dev/pro deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,pro]
          pip install pytest-xdist

      - name: Run the slow tier (deselected from the fast PR gate)
        # The heavy `slow` tests (multi-minute pipe sweeps) are deselected from the
        # fast Unit Tests matrix AND from the blocking Test Coverage job so both
        # stay fast. They run here nightly instead, so a real failure surfaces
        # within a day. We measure their coverage contribution (--cov, non-gating,
        # printed term-missing) so the slow tier's lines aren't invisible now that
        # the master coverage badge is computed on the non-slow suite.
        env:
          MPLBACKEND: Agg
          COVERAGE_CORE: sysmon
        run: pytest tests -m slow --cov=aaanalysis --cov-branch --cov-report=term-missing -n auto --durations=20

      - name: Verify CPP regression anchor (canonical cell)
        env:
          MPLBACKEND: Agg
        run: pytest tests -m regression -vv

      - name: Verify live online fetches (AlphaFold etc.)
        env:
          MPLBACKEND: Agg
        run: pytest tests -m network --run-network -vv

      - name: Mutation audit of CPP numeric core (non-gating)
        continue-on-error: true
        run: |
          mutmut run || true
          mutmut results || true
          mutmut html || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutmut-report
          path: html/
          if-no-files-found: ignore
