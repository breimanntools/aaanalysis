name: Unit Tests

on:
  push:
    branches:
      - master
    # Docs-only changes can't affect test outcomes, so skip the matrix for them.
    # A commit touching any non-doc file (e.g. *.py, pyproject.toml) still runs.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.rst'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.rst'

# Cancel a superseded in-progress run on PR branches (saves runner minutes), but
# NOT on master: a cancelled run's conclusion renders as red "failing" on the
# Unit Tests badge, so master runs always complete to a real pass/fail.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        # windows pinned to a concrete image (windows-latest redirects to
        # windows-2025 by 2026-06-15) for reproducible runs; bump deliberately.
        os: [ubuntu-latest, windows-2022]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        # Linux covers the full Python range; Windows only brackets min+max
        # (3.10 + 3.14) here, full Windows range runs in the nightly. 10 jobs -> 7.
        exclude:
          - {os: windows-2022, python-version: '3.11'}
          - {os: windows-2022, python-version: '3.12'}
          - {os: windows-2022, python-version: '3.13'}

    steps:
    - uses: actions/checkout@v6

    - name: Cache Python dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[pro]
        pip install pytest hypothesis ipython pytest-xdist

    - name: Install cd-hit (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cd-hit

    - name: Install mmseqs2 (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y mmseqs2

    # FIMO (MEME suite) gates the scan_motif end-to-end / parity / golden tests
    # (@fimo_required). It is not in apt and we avoid conda (ADR-0019), so it is
    # built from source on Linux and cached on the version key. @fimo_required
    # tests skip on Windows.
    - name: Cache MEME suite (FIMO)
      if: runner.os == 'Linux'
      id: cache-meme
      uses: actions/cache@v5
      with:
        path: ~/meme-install
        key: ${{ runner.os }}-meme-5.5.8

    - name: Build FIMO from MEME suite (Ubuntu)
      if: runner.os == 'Linux' && steps.cache-meme.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential zlib1g-dev
        MEME_VERSION=5.5.8
        curl -sSL "https://meme-suite.org/meme/meme-software/${MEME_VERSION}/meme-${MEME_VERSION}.tar.gz" -o meme.tar.gz
        tar -xzf meme.tar.gz
        cd "meme-${MEME_VERSION}"
        ./configure --prefix="$HOME/meme-install" --enable-build-libxml2 --enable-build-libxslt
        make -j"$(nproc)"
        make install

    - name: Add FIMO to PATH (Ubuntu)
      if: runner.os == 'Linux'
      run: echo "$HOME/meme-install/bin" >> "$GITHUB_PATH"

    - name: Run Tests
      # The exact-value regression anchor (-m regression) runs in the nightly
      # job, not in this fail-fast matrix (ADR-0015) — its frozen values are
      # canonical-cell-specific and must not gate every cell.
      # The integration/e2e tiers have their own `Integration & E2E Tests`
      # workflow (integration_e2e.yml, ADR-0031); excluded here to avoid a
      # double-run.
      run: pytest tests -m "not regression and not integration and not e2e" -x -n auto --durations=20
      env:
        MPLBACKEND: Agg

  # Coverage is measured and uploaded by the standalone `Test Coverage` workflow
  # (.github/workflows/test_coverage.yml) — kept separate so it appears as its own
  # action/check and runs on its own canonical config (Linux, Python 3.12), per
  # ADR-0016.
