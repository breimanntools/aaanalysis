name: Unit Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[pro]
        pip install pytest hypothesis ipython

    - name: Install cd-hit (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cd-hit

    - name: Install mmseqs2 (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y mmseqs2

    - name: Run Tests
      # The exact-value regression anchor (-m regression) runs in the nightly
      # job, not in this fail-fast matrix (ADR-0015) — its frozen values are
      # canonical-cell-specific and must not gate every cell.
      run: pytest tests -m "not regression" -x -vv --durations=20
      env:
        HYPOTHESIS_DEADLINE: 10000000
        MPLBACKEND: Agg
