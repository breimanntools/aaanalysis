name: Type Check (ratchet)

# pyright runs as a NO-REGRESSION RATCHET, not a clean/strict gate. It is
# public-API-first (pyrightconfig.json excludes aaanalysis/**/_backend). The
# budget-check step fails the job only when the diagnostic count rises ABOVE the
# committed high-water mark (.github/pyright_baseline.txt); merging at or below
# that mark is allowed, so the method-body Optional burn-down proceeds without a
# clean-gate. New type errors are blocked; the existing backlog is not. The
# pyright version is pinned so the committed baseline is reproducible (a bump is a
# deliberate re-baseline). The raw `pyright` step stays advisory (its report is in
# the log); only the ratchet step gates. Type hints are the read-time contract;
# py.typed ships the annotations downstream.
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.rst'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.rst'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package + pyright (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[pro]
          # Pin pyright so the committed baseline count is reproducible; a bump is
          # a deliberate re-baseline (update .github/pyright_baseline.txt with it).
          pip install pyright==1.1.410

      - name: Run pyright (advisory report — never fails the build)
        continue-on-error: true
        run: pyright

      - name: Pyright diagnostics ratchet (GATES — fails on count above baseline)
        run: python .github/scripts/check_pyright_budget.py
