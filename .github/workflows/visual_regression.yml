name: Visual Regression

# Pixel-comparison gate for the signature CPP plots (pytest-mpl). Pixel rendering is
# OS/font/matplotlib-version sensitive, so this runs on ONE pinned environment and the
# baselines are generated on this same runner (dispatch with regenerate=true), which
# makes the comparison self-consistent regardless of where a contributor works.
on:
  pull_request:
    branches: [master]
    paths:
      - 'aaanalysis/**/*.py'
      - 'tests/unit/plotting_tests/**'
      - '.github/workflows/visual_regression.yml'
  workflow_dispatch:
    inputs:
      regenerate:
        description: 'Regenerate baselines on this runner and upload them as an artifact'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install (pinned matplotlib for pixel stability)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[pro]
          pip install pytest pytest-mpl "matplotlib==3.11.0"
      - name: Regenerate baselines
        if: ${{ github.event.inputs.regenerate == 'true' }}
        run: |
          pytest tests/unit/plotting_tests/test_visual_regression.py -c tests/pytest.ini \
            --mpl-generate-path=tests/unit/plotting_tests/baseline
      - name: Upload regenerated baselines
        if: ${{ github.event.inputs.regenerate == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: mpl-baselines
          path: tests/unit/plotting_tests/baseline/*.png
      - name: Compare against committed baselines (gate)
        if: ${{ github.event.inputs.regenerate != 'true' }}
        run: |
          pytest tests/unit/plotting_tests/test_visual_regression.py -c tests/pytest.ini \
            --mpl --mpl-results-path=mpl-results -vv
      - name: Upload diff images on failure
        if: ${{ failure() && github.event.inputs.regenerate != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: mpl-diff-results
          path: mpl-results
