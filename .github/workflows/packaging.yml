name: Packaging

# Build the sdist + wheel and prove the *built wheel* installs clean and its
# public API imports on a base-deps-only environment. The test matrices install
# the editable source tree (where every module + data file always exists), so a
# missing package-data glob, a bad build-backend include, or a broken __init__
# re-export only surfaces after a user pip-installs the release. This gate catches
# it first. Runs on every push/PR to master (no paths-ignore) so it can be made a
# required status check without the "skipped-but-required" branch-protection trap.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build-and-smoke:
    name: Wheel install smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Min + max supported Python (matches the unit-matrix brackets). The wheel
        # carries the compiled Cython extension, so it is ABI-specific (cp310 vs
        # cp314) — each leg builds and installs its own wheel; a single wheel cannot
        # cover the matrix.
        python-version: ['3.10', '3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build sdist + wheel (both from source)
        # NOTE: `python -m build --sdist --wheel` builds each distribution from the
        # source tree. The bare `python -m build` builds the wheel *from the sdist*,
        # which fails here because the sdist omits the Cython source _inner.pyx (no
        # MANIFEST.in / *.pyx package-data). The wheel is the shipped artifact under
        # test and cibuildwheel likewise builds it from source.
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --wheel --outdir dist

      - name: Assert exactly one wheel and one sdist
        run: |
          shopt -s nullglob
          whls=(dist/*.whl); sdists=(dist/*.tar.gz)
          echo "wheels:  ${whls[*]:-<none>}"
          echo "sdists:  ${sdists[*]:-<none>}"
          [ "${#whls[@]}" -eq 1 ]   || { echo "::error::expected exactly 1 wheel, got ${#whls[@]}"; exit 1; }
          [ "${#sdists[@]}" -eq 1 ] || { echo "::error::expected exactly 1 sdist, got ${#sdists[@]}"; exit 1; }

      - name: Install the built wheel into a clean base-deps-only venv
        # A fresh venv (not the job interpreter, which carries `build` + pip) proves
        # the install resolves ONLY the wheel's base [project.dependencies] — no
        # [dev], no [pro]. That is what catches missing package data / bad includes.
        run: |
          python -m venv "$RUNNER_TEMP/smoke-venv"
          "$RUNNER_TEMP/smoke-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/smoke-venv/bin/python" -m pip install dist/*.whl

      - name: Public-API import + bundled-data check
        # Run from a neutral cwd + by absolute path so sys.path[0] is tests/ (no
        # aaanalysis there) and `import aaanalysis` resolves to the installed wheel,
        # never the checkout. The script's own source-tree guard is the backstop.
        run: |
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/smoke-venv/bin/python" "$GITHUB_WORKSPACE/tests/_check_public_api_packaged.py"
