name: Build wheels

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  generate-wheels-matrix:
    name: Generate wheels matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install cibuildwheel
        run: pipx install cibuildwheel==2.21.3
      - id: set-matrix
        # Build identifiers (e.g. `cp311-manylinux_x86_64`) come from
        # cibuildwheel itself based on the [tool.cibuildwheel] config in
        # pyproject.toml. We turn each identifier into a matrix entry
        # `{only: <id>, os: <runner>}` so `build_wheels` can shard.
        run: |
          MATRIX=$(
            {
              cibuildwheel --print-build-identifiers --platform linux \
                | jq -nRc '[inputs | {only: ., os: "ubuntu-latest"}]'
              cibuildwheel --print-build-identifiers --platform macos \
                | jq -nRc '[inputs | {only: ., os: "macos-latest"}]'
              cibuildwheel --print-build-identifiers --platform windows \
                | jq -nRc '[inputs | {only: ., os: "windows-latest"}]'
            } | jq -sc 'add'
          )
          echo "include=$MATRIX" >> $GITHUB_OUTPUT

  build_wheels:
    name: Build ${{ matrix.only }}
    needs: generate-wheels-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-wheels-matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up QEMU (for Linux aarch64)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          only: ${{ matrix.only }}
        # cibuildwheel reads [tool.cibuildwheel] from pyproject.toml,
        # which installs the wheel into a clean env and runs the parity
        # test (test_get_feature_matrix_c_parity.py) against the
        # compiled `_inner.cpython-XYZ.so`. A wheel that doesn't pass
        # bit-exact parity vs the legacy path fails the build here,
        # before it ever reaches PyPI.

      - uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: bdist_${{ matrix.only }}

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist (pep517)
        run: |
          python -m pip install build
          python -m build --sdist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist_files
          path: dist/*.tar.gz

  publish_wheels:
    name: Publish wheels on PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: bdist_*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sdist_files
          path: dist
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
