name: CodeQL

on:
  push:
    branches:
      - master
    # Docs-only changes carry no code for CodeQL to analyze, so skip them.
    # The weekly schedule below still re-scans master regardless.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '**/*.rst'
  pull_request:
    branches:
      - master
    # NO paths-ignore on the PR trigger: `code-quality` is a REQUIRED check, and a
    # path-skipped workflow never reports it, so a docs-only PR would block forever. The
    # `changes` job skips it on a docs-only diff (its checks read only .py, so nothing is
    # lost). The `push` trigger keeps its paths-ignore below.
  schedule:
    - cron: '0 0 * * 0'

# Cancel a superseded in-progress run on the same branch/PR (saves runner minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # On a docs-only PR the required `code-quality` job below skips (its checks read only
  # .py, so nothing is lost) yet still reports success. Fail-safe: anything not purely
  # docs (docs/**, *.md, *.rst), a non-PR event, or a detection failure runs it in full.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          files="$(git diff --name-only "${BASE}...${HEAD}" || true)"
          echo "Changed files:"; printf '%s\n' "$files"
          # Count files that are NOT docs (docs/**, *.md, *.rst). Use -c (a count), not
          # -vq: BSD and GNU grep disagree on the exit status of `-vq`, but the count is
          # identical on both. Fail-safe: an empty list, or any doubt, runs the full check.
          if [ -z "$files" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            n_code=$(printf '%s\n' "$files" | grep -vcE '^(docs/|.*\.md$|.*\.rst$)' || true)
            if [ "${n_code:-1}" -gt 0 ]; then
              echo "code=true" >> "$GITHUB_OUTPUT"
            else
              echo "code=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  analyze:
    name: Analyze
    # CodeQL is a security scan, not a correctness gate, and adds several minutes.
    # Keep it off the PR fast path: it runs on every master push and on the weekly
    # schedule above. The fast `code-quality` job below still runs on PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "python"
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  code-quality:
    needs: changes
    # Skipped on a docs-only PR (reports skipped = passing); its checks read only .py.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache Python dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.12-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-3.12-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[pro]
        pip install flake8 pylint

    - name: Install cd-hit and mmseqs2
      run: |
        sudo apt-get update
        sudo apt-get install -y cd-hit
        sudo apt-get install -y mmseqs2

    - name: Run flake8 (check style)
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Check docstring house style
      run: python .claude/skills/docstrings/scripts/check_docstrings.py

    - name: Check doc/signature drift
      run: python .claude/skills/docstrings/scripts/doc_signature_drift.py

    - name: Check example-notebook parameter coverage (advisory, non-blocking)
      continue-on-error: true
      run: python .claude/skills/docstrings/scripts/check_example_notebooks.py